<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Викторина: Продукты в холодильнике</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Nunito', sans-serif;
            background-color: #e0f2fe; /* Светло-голубой, холодный фон (холодильник) */
            background-image: radial-gradient(#bae6fd 2px, transparent 2px);
            background-size: 30px 30px;
        }
        .option-btn {
            transition: all 0.2s ease;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }
        .option-btn:hover:not(:disabled) {
            transform: translateY(-3px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
        }
        .option-btn:active:not(:disabled) {
            transform: translateY(0);
        }
        .correct {
            background-color: #4ade80 !important; /* Зеленый */
            color: white !important;
            border-color: #22c55e !important;
            transform: scale(1.05);
        }
        .wrong {
            background-color: #f87171 !important; /* Красный */
            color: white !important;
            border-color: #ef4444 !important;
            animation: shake 0.4s;
        }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            50% { transform: translateX(5px); }
            75% { transform: translateX(-5px); }
        }
        .bounce-in {
            animation: bounceIn 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        @keyframes bounceIn {
            0% { transform: scale(0.5); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-4">

    <!-- Экран загрузки -->
    <div id="loading-screen" class="flex flex-col items-center justify-center text-center">
        <div class="text-6xl animate-bounce mb-4">⏳</div>
        <h2 class="text-2xl font-bold text-blue-800">Загружаем игру...</h2>
    </div>

    <!-- Стартовое окно -->
    <div id="start-screen" class="hidden bg-white rounded-3xl shadow-2xl w-full max-w-md p-8 text-center border-4 border-blue-300 bounce-in">
        <div class="text-7xl mb-4">👋</div>
        <h1 class="text-3xl font-extrabold text-blue-800 mb-6">Давай играть!</h1>
        <input type="text" id="player-name-input" placeholder="Как тебя зовут?" class="w-full bg-blue-50 border-2 border-blue-200 text-blue-800 text-xl font-bold rounded-2xl p-4 mb-6 text-center outline-none focus:border-blue-500 transition" autocomplete="off">
        <button id="start-btn" class="w-full bg-green-500 hover:bg-green-600 text-white font-bold py-4 px-8 rounded-2xl text-xl shadow-lg transition transform hover:scale-105">
            Начать игру 🚀
        </button>
    </div>

    <!-- Главный контейнер игры -->
    <div id="game-container" class="hidden bg-white rounded-3xl shadow-2xl w-full max-w-2xl p-6 md:p-10 border-4 border-blue-300 relative overflow-hidden">
        
        <!-- Шапка: Прогресс -->
        <div class="flex flex-col md:flex-row justify-between items-center mb-8 bg-blue-50 p-4 rounded-2xl border-2 border-blue-100">
            <div class="flex flex-col text-center md:text-left mb-4 md:mb-0">
                <span class="text-xl font-extrabold text-blue-800" id="display-name">Игрок: </span>
                <span class="text-lg font-bold text-green-600" id="display-score">Очки: 0</span>
            </div>
            <div class="text-center mb-4 md:mb-0">
                <div class="text-blue-500 font-bold text-lg" id="question-counter">Вопрос 1 из 5</div>
                <div class="flex space-x-1 justify-center mt-2" id="progress-dots"></div>
            </div>
            <div>
                <button id="header-restart-btn" class="bg-blue-200 hover:bg-blue-300 text-blue-800 font-bold py-2 px-4 rounded-xl transition shadow-sm">
                    Заново 🔄
                </button>
            </div>
        </div>

        <!-- Контент вопроса -->
        <div id="question-area" class="text-center mb-8">
            <div class="text-6xl mb-4" id="question-icon">🧀</div>
            <h2 id="question-text" class="text-2xl md:text-3xl font-extrabold text-gray-800 leading-tight">
                Вопрос появится здесь...
            </h2>
        </div>

        <!-- Варианты ответов -->
        <div id="options-container" class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-8">
            <!-- Кнопки генерируются в JS -->
        </div>

        <!-- Обратная связь (похвала) -->
        <div id="feedback-container" class="hidden text-center bounce-in">
            <p id="feedback-text" class="text-xl font-bold text-green-500 mb-6"></p>
            <button id="next-btn" class="bg-blue-500 hover:bg-blue-600 text-white font-bold py-3 px-8 rounded-full text-lg shadow-lg transition transform hover:scale-105">
                Дальше! ➡️
            </button>
        </div>

        <!-- Экран завершения -->
        <div id="result-screen" class="hidden text-center bounce-in">
            <div class="text-7xl mb-4">🏆</div>
            <h2 class="text-3xl font-extrabold text-gray-800 mb-2">Отлично!</h2>
            
            <!-- Блок с баллами -->
            <div class="bg-blue-100 rounded-2xl p-4 my-6 inline-block">
                <p class="text-2xl font-bold text-blue-700" id="final-score-text">Твой счёт: 0 из 5</p>
                <p class="text-md text-blue-600 mt-1" id="final-score-comment">Супер! Ты молодец!</p>
            </div>
            
            <p class="text-lg text-gray-500 mb-8">Баллы даются за правильный ответ с первой попытки.</p>
            
            <button id="restart-btn" class="bg-green-500 hover:bg-green-600 text-white font-bold py-3 px-8 rounded-full text-lg shadow-lg transition transform hover:scale-105">
            Играть ещё раз 🔄
        </button>
    </div>

</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
    import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
    import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

    // ДАННЫЕ ИГРЫ (Методическая часть)
    // Тема: Род. падеж, ед.ч., м.р. и ср.р. (Уровень А1)
        const quizData = [
            {
                icon: "🧀",
                question: "Я хочу бутерброд, но в холодильнике нет...",
                options: ["сыр", "сыра", "сыром"],
                correctIndex: 1, // Индекс правильного ответа (сыра)
                praise: "Молодец! Это правильный ответ."
            },
            {
                icon: "🥛",
                question: "У нас есть вода, но нет...",
                options: ["молоко", "молока", "молоке"],
                correctIndex: 1, // (молока)
                praise: "Отлично! Правильный ответ."
            },
            {
                icon: `<svg viewBox="0 0 100 100" width="1em" height="1em" class="inline-block drop-shadow-md"><path d="M30,40 Q30,30 40,25 L40,15 L60,15 L60,25 Q70,30 70,40 L75,90 Q75,95 70,95 L30,95 Q25,95 25,90 Z" fill="#f8fafc" stroke="#94a3b8" stroke-width="4"/><rect x="35" y="5" width="30" height="10" rx="3" fill="#22c55e" stroke="#15803d" stroke-width="3"/><rect x="26.5" y="50" width="47" height="25" fill="#4ade80" stroke="#15803d" stroke-width="2"/><text x="50" y="68" font-family="sans-serif" font-size="14" font-weight="bold" fill="#064e3b" text-anchor="middle">КЕФИР</text></svg>`, // Бутылка кефира (SVG)
                question: "В магазине нет...",
                options: ["кефир", "кефиром", "кефира"],
                correctIndex: 2, // (кефира)
                praise: "Правильно!"
            },
            {
                icon: "🧈",
                question: "У нас дома нет...",
                options: ["масла", "масло", "масле"],
                correctIndex: 0, // (масла)
                praise: "Хорошо! Ты молодец."
            },
            {
            icon: "🧃",
            question: "На столе нет...",
            options: ["сок", "сока", "соком"],
            correctIndex: 1, // (сока)
            praise: "Супер! Правильный ответ."
        }
    ];

    // ЛОГИКА ПРИЛОЖЕНИЯ (Инженерная часть)
    let currentQuestionIndex = 0;
    let isAnswered = false;
    let score = 0;
    let currentAttempts = 0;
    let playerName = "";

    // Firebase Setup
    let db, auth, currentUser;
    const appId = typeof __app_id !== 'undefined' ? __app_id : 'default-quiz-app';

    // DOM элементы
    const loadingScreen = document.getElementById('loading-screen');
    const startScreen = document.getElementById('start-screen');
    const gameContainer = document.getElementById('game-container');
    const questionCounterEl = document.getElementById('question-counter');
    const progressDotsEl = document.getElementById('progress-dots');
    const questionIconEl = document.getElementById('question-icon');
    const questionTextEl = document.getElementById('question-text');
    const optionsContainer = document.getElementById('options-container');
    const feedbackContainer = document.getElementById('feedback-container');
    const feedbackText = document.getElementById('feedback-text');
    const nextBtn = document.getElementById('next-btn');
    const resultScreen = document.getElementById('result-screen');
    const finalScoreText = document.getElementById('final-score-text');
    const finalScoreComment = document.getElementById('final-score-comment');
    
    const displayNameEl = document.getElementById('display-name');
    const displayScoreEl = document.getElementById('display-score');
    const playerNameInput = document.getElementById('player-name-input');
    const startBtn = document.getElementById('start-btn');
    const headerRestartBtn = document.getElementById('header-restart-btn');
    const resultRestartBtn = document.getElementById('restart-btn');

    // Инициализация Firebase и загрузка
    async function initApp() {
        try {
            const firebaseConfig = JSON.parse(typeof __firebase_config !== 'undefined' ? __firebase_config : '{}');
            const app = initializeApp(firebaseConfig);
            auth = getAuth(app);
            db = getFirestore(app);

            const initAuth = async () => {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }
            };
            await initAuth();

            onAuthStateChanged(auth, async (user) => {
                if (user) {
                    currentUser = user;
                    await loadProgress();
                }
            });
        } catch (e) {
            console.warn("Облачное сохранение недоступно, используется локальный режим.", e);
            loadingScreen.classList.add('hidden');
            startScreen.classList.remove('hidden');
        }
    }

    // Облачное сохранение
    async function saveProgress() {
        if (!currentUser || !db) return;
        const docRef = doc(db, 'artifacts', appId, 'users', currentUser.uid, 'gamestate', 'current');
        try {
            await setDoc(docRef, { playerName, currentQuestionIndex, score });
        } catch (e) {
            console.error("Ошибка сохранения", e);
        }
    }

    // Загрузка из облака
    async function loadProgress() {
        if (!currentUser || !db) return;
        const docRef = doc(db, 'artifacts', appId, 'users', currentUser.uid, 'gamestate', 'current');
        try {
            const snap = await getDoc(docRef);
            loadingScreen.classList.add('hidden');
            if (snap.exists() && snap.data().playerName) {
                const data = snap.data();
                playerName = data.playerName;
                currentQuestionIndex = data.currentQuestionIndex || 0;
                score = data.score || 0;

                if (currentQuestionIndex >= quizData.length) {
                    showResult();
                } else {
                    startGameUI();
                }
            } else {
                startScreen.classList.remove('hidden');
            }
        } catch (e) {
            loadingScreen.classList.add('hidden');
            startScreen.classList.remove('hidden');
        }
    }

    // Запуск игры из стартового экрана
    startBtn.onclick = async () => {
        const name = playerNameInput.value.trim();
        if (!name) {
            playerNameInput.classList.add('border-red-500');
            return;
        }
        playerNameInput.classList.remove('border-red-500');
        playerName = name;
        currentQuestionIndex = 0;
        score = 0;
        await saveProgress();
        startGameUI();
    };

    // Переход в интерфейс игры
    function startGameUI() {
        startScreen.classList.add('hidden');
        resultScreen.classList.add('hidden');
        gameContainer.classList.remove('hidden');
        document.getElementById('question-area').classList.remove('hidden');
        optionsContainer.classList.remove('hidden');
        updateHeader();
        renderProgressDots();
        loadQuestion();
    }

    // Обновление панели заголовка
    function updateHeader() {
        displayNameEl.innerText = `Игрок: ${playerName}`;
        displayScoreEl.innerText = `Очки: ${score}`;
    }

    // Рендер точек прогресса
    function renderProgressDots() {
        progressDotsEl.innerHTML = '';
        for (let i = 0; i < quizData.length; i++) {
            const dot = document.createElement('div');
            dot.className = `w-3 h-3 rounded-full ${i === currentQuestionIndex ? 'bg-blue-500 scale-125' : 'bg-blue-200'} transition-all`;
            dot.id = `dot-${i}`;
            progressDotsEl.appendChild(dot);
        }
    }

    // Загрузка вопроса
    function loadQuestion() {
        isAnswered = false;
        currentAttempts = 0;
        feedbackContainer.classList.add('hidden');
        optionsContainer.innerHTML = '';

        const currentQ = quizData[currentQuestionIndex];
        questionCounterEl.innerText = `Вопрос ${currentQuestionIndex + 1} из ${quizData.length}`;
        questionIconEl.innerHTML = currentQ.icon; 
        questionTextEl.innerText = currentQ.question;

        for (let i = 0; i < quizData.length; i++) {
            const dot = document.getElementById(`dot-${i}`);
            if (i === currentQuestionIndex) {
                dot.className = 'w-3 h-3 rounded-full bg-blue-500 scale-125 transition-all shadow-md';
            } else if (i < currentQuestionIndex) {
                dot.className = 'w-3 h-3 rounded-full bg-green-400 transition-all';
            } else {
                dot.className = 'w-3 h-3 rounded-full bg-blue-200 transition-all';
            }
        }

        currentQ.options.forEach((option, index) => {
            const btn = document.createElement('button');
            btn.className = 'option-btn bg-white border-2 border-blue-200 text-blue-700 font-bold text-xl py-4 px-6 rounded-2xl w-full';
            btn.innerText = option;
            btn.onclick = () => handleAnswer(index, btn);
            optionsContainer.appendChild(btn);
        });
    }

    // Обработка клика по ответу
    async function handleAnswer(selectedIndex, btnElement) {
        if (isAnswered) return;

        const currentQ = quizData[currentQuestionIndex];
        const allBtns = optionsContainer.querySelectorAll('button');

        if (selectedIndex === currentQ.correctIndex) {
            isAnswered = true;
            if (currentAttempts === 0) {
                score++;
                updateHeader();
            }
            btnElement.classList.add('correct');
            allBtns.forEach(b => {
                b.disabled = true;
                if(b !== btnElement) b.classList.add('opacity-50');
            });
            feedbackText.innerText = currentQ.praise;
            feedbackContainer.classList.remove('hidden');
        } else {
            currentAttempts++;
            btnElement.classList.add('wrong');
            setTimeout(() => btnElement.classList.remove('wrong'), 500);
        }
    }

    // Переход к следующему
    nextBtn.onclick = async () => {
        currentQuestionIndex++;
        await saveProgress();
        if (currentQuestionIndex < quizData.length) {
            loadQuestion();
        } else {
            showResult();
        }
    };

    // Экран результатов
    function showResult() {
        document.getElementById('question-area').classList.add('hidden');
        optionsContainer.classList.add('hidden');
        feedbackContainer.classList.add('hidden');
        
        finalScoreText.innerText = `Твой счёт: ${score} из ${quizData.length}`;
        
        if (score === quizData.length) {
            finalScoreComment.innerText = "Идеально! Ни одной ошибки!";
            finalScoreComment.className = "text-md text-green-600 mt-1 font-bold";
        } else if (score >= 3) {
            finalScoreComment.innerText = "Хороший результат! Но есть куда расти.";
            finalScoreComment.className = "text-md text-blue-600 mt-1 font-bold";
        } else {
            finalScoreComment.innerText = "Нужно еще немного потренироваться!";
            finalScoreComment.className = "text-md text-orange-600 mt-1 font-bold";
        }

        resultScreen.classList.remove('hidden');
        gameContainer.classList.remove('hidden'); // Убедимся, что контейнер виден
    }

    // Обработка кнопок "Заново"
    const resetGame = async () => {
        currentQuestionIndex = 0;
        score = 0;
        await saveProgress();
        startGameUI();
    };

    headerRestartBtn.onclick = resetGame;
    resultRestartBtn.onclick = resetGame;

    // Запуск
    initApp();
</script>
</body>
</html>
